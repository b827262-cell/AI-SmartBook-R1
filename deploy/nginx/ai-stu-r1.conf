server {
    listen 80;
    server_name _;

    root /opt/AI-Stu-R1/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/student/ {
        proxy_pass http://127.0.0.1:4310/api/student/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
